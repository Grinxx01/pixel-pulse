<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pixel Pulse - Controller</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        body {
            margin: 0;
            padding: 0;
            background: #050510;
            color: #fff;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        #login-screen {
            text-align: center;
            padding: 40px;
            width: 90%;
            max-width: 400px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            border: 1px solid rgba(0, 255, 204, 0.3);
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.5);
        }

        #nickname-display {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            color: #00ffcc;
            padding: 10px 25px;
            border-radius: 30px;
            border: 1px solid #00ffcc;
            font-weight: bold;
            display: none;
            z-index: 1000;
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.3);
        }

        h1 {
            color: #00ffcc;
            text-shadow: 0 0 10px #00ffcc;
            margin-bottom: 20px;
            font-size: 28px;
        }

        input {
            width: 100%;
            padding: 15px;
            border: 2px solid #00ffcc;
            background: rgba(0, 0, 0, 0.3);
            color: #fff;
            border-radius: 12px;
            font-size: 18px;
            margin-bottom: 20px;
            outline: none;
            text-align: center;
        }

        button.join-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #00ffcc, #0099ff);
            color: #050510;
            border: none;
            border-radius: 12px;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0, 255, 204, 0.4);
            transition: 0.2s;
        }

        button.join-btn:active {
            transform: scale(0.98);
        }

        #controller-screen {
            display: none;
            width: 100%;
            height: 100%;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: #050510;
        }

        .controls-grid {
            display: grid;
            grid-template-areas:
                ". up ."
                "left . right"
                ". down .";
            gap: 25px;
            padding: 20px;
        }

        .d-btn {
            width: 95px;
            height: 95px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            background: #111;
            border: 3px solid #00ffcc;
            border-radius: 20px;
            color: #00ffcc;
            transition: 0.1s;
            box-shadow: 0 6px 0 #005544, 0 5px 15px rgba(0, 0, 0, 0.5);
            touch-action: none;
        }

        .d-btn:active {
            background: #00ffcc;
            color: #050510;
            transform: translateY(4px);
            box-shadow: 0 2px 0 #005544, 0 2px 5px rgba(0, 0, 0, 0.5);
        }

        #up {
            grid-area: up;
        }

        #down {
            grid-area: down;
        }

        #left {
            grid-area: left;
        }

        #right {
            grid-area: right;
        }

        #spectator-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            color: #fff;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            text-align: center;
            padding: 30px;
        }

        #game-over-screen {
            display: none;
            text-align: center;
            background: rgba(40, 0, 0, 0.9);
            width: 100%;
            height: 100%;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 3000;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .rank-text {
            font-size: 60px;
            font-weight: 900;
            margin: 20px 0;
            color: #00ffcc;
            text-shadow: 0 0 20px rgba(0, 255, 204, 0.5);
        }
    </style>
</head>

<body>

    <div id="nickname-display"></div>

    <div id="login-screen">
        <h1>Pixel Pulse</h1>
        <p style="color: #888; margin-top: -15px; margin-bottom: 25px;">Multiplayer Sumo Battle</p>
        <input type="text" id="nameInput" placeholder="Nickname..." maxlength="10">
        <button class="join-btn" onclick="joinGame()">JOIN ARENA</button>
    </div>

    <div id="controller-screen">
        <div class="controls-grid">
            <div id="up" class="d-btn">↑</div>
            <div id="left" class="d-btn">←</div>
            <div id="right" class="d-btn">→</div>
            <div id="down" class="d-btn">↓</div>
        </div>
    </div>

    <div id="spectator-overlay">
        <h2 style="color: #00ffcc; font-size: 32px; margin-bottom: 10px;">SPECTATOR MODE</h2>
        <p style="color: #aaa; font-size: 18px;">Game sedang berlangsung.</p>
        <p style="color: #aaa;">Kamu akan masuk di ronde berikutnya!</p>
    </div>

    <div id="game-over-screen">
        <h1 style="color: #ff3333; text-shadow: 0 0 15px rgba(255, 51, 51, 0.5); font-size: 40px;">DIELIMINASI!</h1>
        <div class="rank-text" id="rankDisplay">RANK #--</div>
        <p style="color: #aaa; margin-bottom: 30px;">Tunggu ronde berikutnya di layar utama...</p>
        <button class="join-btn" onclick="window.location.reload()" style="width: auto; padding: 15px 40px;">BALIK KE
            LOBBY</button>
    </div>

    <script>
        const socket = io();
        const inputs = { up: false, down: false, left: false, right: false };

        socket.on('join-error', (data) => {
            alert(data.message);
            window.location.reload();
        });

        socket.on('join-spectator', (data) => {
            document.getElementById('spectator-overlay').style.display = 'flex';
        });

        socket.on('game-over', (data) => {
            document.getElementById('controller-screen').style.display = 'none';
            document.getElementById('game-over-screen').style.display = 'flex';
            document.getElementById('rankDisplay').innerText = `RANK #${data.rank}`;
            if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
        });

        socket.on('champion-announced', (data) => {
            alert(`RONDE SELESAI! ${data.name} adalah CHAMPION!`);
            setTimeout(() => window.location.reload(), 3000);
        });

        socket.on('state-changed', (data) => {
            console.log("Game State:", data.gameState);
            if (data.gameState === 'LOBBY') {
                document.getElementById('game-over-screen').style.display = 'none';
                document.getElementById('spectator-overlay').style.display = 'none';
            }
        });

        function getRandomNeonColor() {
            const colors = ['#00ffcc', '#ff00ff', '#ffff00', '#0077ff', '#ff3333', '#33ff33'];
            return colors[Math.floor(Math.random() * colors.length)];
        }

        function joinGame() {
            const nameEl = document.getElementById('nameInput');
            const name = nameEl.value.trim();
            if (!name) return alert('Masukkan namamu!');

            socket.emit('player-join', {
                name: name,
                color: getRandomNeonColor()
            });

            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('controller-screen').style.display = 'flex';

            const nickDisplay = document.getElementById('nickname-display');
            nickDisplay.innerText = name;
            nickDisplay.style.display = 'block';
        }

        function setupButton(id, key) {
            const btn = document.getElementById(id);
            const updateInput = (val) => {
                if (inputs[key] !== val) {
                    inputs[key] = val;
                    socket.emit('player-input', inputs);
                }
            };

            btn.addEventListener('pointerdown', (e) => {
                e.preventDefault();
                updateInput(true);
            });
            btn.addEventListener('pointerup', (e) => {
                e.preventDefault();
                updateInput(false);
            });
            btn.addEventListener('pointerleave', (e) => {
                e.preventDefault();
                if (inputs[key]) updateInput(false);
            });
        }

        setupButton('up', 'up');
        setupButton('down', 'down');
        setupButton('left', 'left');
        setupButton('right', 'right');

        // Prevent system menus
        window.oncontextmenu = (e) => e.preventDefault();
    </script>
</body>

</html>
